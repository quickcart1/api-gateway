spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**

        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/products/**

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**

        - id: cart-service
          uri: http://cart-service:8084
          predicates:
            - Path=/api/cart/**

        - id: inventory-service
          uri: http://inventory-service:8085
          predicates:
            - Path=/api/inventory/**

        - id: payment-service
          uri: http://payment-service:8086
          predicates:
            - Path=/api/payments/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
